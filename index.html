<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fabric Matchmaker — Selvedge & Bolts</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#080808;--white:#ffffff;--off:#f5f5f5;--mid:#999;--border:#e0e0e0;--serif:'Playfair Display',Georgia,serif;--sans:'DM Sans',sans-serif;}
html,body{height:100%;font-family:var(--sans);background:var(--white);color:var(--black);overflow:hidden}
.shell{display:flex;flex-direction:column;height:100vh;max-width:720px;margin:0 auto;border-left:1px solid var(--border);border-right:1px solid var(--border)}
.header{border-bottom:2px solid var(--black);padding:0 28px;height:64px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--white)}
.header-logo{height:28px;width:auto;display:block}
.header-right{display:flex;align-items:center;gap:10px}
.header-tag{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--black);font-weight:500;border:1px solid var(--black);padding:3px 9px}
.header-dot{width:6px;height:6px;border-radius:50%;background:#222}
.messages{flex:1;overflow-y:auto;padding:36px 32px;display:flex;flex-direction:column;gap:22px;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:3px}
.messages::-webkit-scrollbar-thumb{background:var(--border)}
.msg-row{display:flex;align-items:flex-start;gap:12px}
.msg-row.user{justify-content:flex-end}
.av{width:26px;height:26px;flex-shrink:0;border:1.5px solid var(--black);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:10px;font-weight:700;color:var(--black);margin-top:2px}
.bubble{padding:13px 17px;font-size:14.5px;line-height:1.75;font-weight:300;animation:popIn 0.15s ease}
@keyframes popIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.bubble.bot{background:var(--white);color:var(--black);border:1px solid var(--black);max-width:88%}
.bubble.user{background:var(--black);color:var(--white);font-weight:400;max-width:72%}
.bubble.typing{display:flex;align-items:center;gap:6px;padding:15px 18px;border:1px solid var(--black)}
.td{width:5px;height:5px;background:var(--black);animation:tdB 1.2s infinite}
.td:nth-child(2){animation-delay:.2s}
.td:nth-child(3){animation-delay:.4s}
@keyframes tdB{0%,60%,100%{opacity:1}30%{opacity:0.15}}
.fabric-card-inline{margin-top:4px;border:1px solid var(--black);border-top:3px solid var(--black);max-width:88%}
.fci-head{padding:16px 18px 12px;border-bottom:1px solid var(--border)}
.fci-eye{font-size:8px;letter-spacing:0.24em;text-transform:uppercase;color:var(--mid);margin-bottom:8px;font-weight:400}
.fci-name{font-family:var(--serif);font-size:18px;font-weight:700;color:var(--black);line-height:1.2;margin-bottom:4px}
.fci-sub{font-size:11px;color:var(--mid);font-weight:300}
.fci-specs{padding:12px 18px;display:flex;flex-wrap:wrap;gap:6px 16px;border-bottom:1px solid var(--border)}
.fci-spec{font-size:11px;color:var(--mid);font-weight:300}
.fci-spec span{color:var(--black);font-weight:500}
.fci-foot{padding:12px 18px;display:flex;align-items:center;justify-content:space-between}
.fci-price{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--black)}
.fci-link{font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--black);text-decoration:none;border-bottom:1px solid var(--black);padding-bottom:2px;font-weight:500;transition:opacity .15s}
.fci-link:hover{opacity:.5}
.input-area{padding:16px 20px;border-top:1px solid var(--black);display:flex;gap:0;align-items:stretch;flex-shrink:0;background:var(--white)}
.chat-input{flex:1;height:44px;border:1px solid var(--black);border-right:none;padding:0 16px;font-size:14px;font-family:var(--sans);font-weight:300;color:var(--black);background:var(--white);outline:none;border-radius:0}
.chat-input::placeholder{color:#bbb}
.send-btn{width:50px;height:44px;background:var(--black);border:1px solid var(--black);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s}
.send-btn:hover{opacity:.7}
.send-btn:disabled{opacity:.2;cursor:default}
</style>
</head>

<script>
const SYS = `You are the Fabric Matchmaker for Selvedge & Bolts — a boutique online shop selling designer deadstock fabric to home sewists.

You are the expert friend. Warm, specific, generous with knowledge. You help people find fabric that makes them want to cancel their weekend plans and just sew.

You generate your own language in the moment — evocative, sensory, specific. You do NOT repeat pre-written descriptions. You use the product facts as your brief and build the recommendation fresh every time.

YOUR OPENING: Say exactly: Hey, what are you making?
Nothing before it. No introduction. Just that.

ASK ONE QUESTION PER MESSAGE. NEVER TWO. EVER.
ONE FABRIC PER RECOMMENDATION TURN. NEVER TWO.

Ask 4-5 natural questions before recommending:
Q1 — The project: What are you making?
Q2 — The vibe: "Garden party romantic, or farmer's market crisp?" / "Something that floats when you walk, or more structured?"
Q3 — Statement vs subtle: "Bold prints that walk in before you do, or something more understated?"
Q4 — Occasion: "Where do you see yourself wearing this?"
Q5 — Experience (only if relevant): "Have you worked with drapey fabrics before?"

THE RECOMMENDATION — CRITICAL:
Connect back to what they said FIRST. Open by reflecting their specific answers back. Make them feel heard before you name the fabric.
WRONG: "Have a look at the 'Meet Me in Milan' Viscose..."
RIGHT: "For a garden party dress that floats when you walk — the 'Meet Me in Milan' Viscose is exactly it..."

Build language yourself from the facts. Never reproduce briefing notes.

Structure (4-5 sentences max):
1. Connect to their context
2. Name the fabric + what makes it special
3. Sensory — feel, movement, behaviour (your words)
4. What it wants to be — garment + lifestyle moment
5. Practical note + offer alternative or invite question

NEAR-MISS: Never open with what you don't have. Lead with what you do have.

BRAND VOICE: Real / Sensory / Generous Expert / Possibility Sparker
USE: contractions, sensory words, movement words, specific garments, lifestyle moments, designer provenance
AVOID: lovely/beautiful/perfect, emojis, two questions at once, two fabrics at once

LIMITED LENGTH: State positively — "You've got X metres, which is plenty for [what it makes]." If length won't work, describe fabric first then ask if they'd like an alternative.

FABRIC CARD TIMING: Only append FABRIC_CARD when you have recommended a fabric AND there is no open question waiting. If your message ends with a question, do NOT append the card.

When card timing is right, append on its own line at the very end:
FABRIC_CARD:{"name":"Full fabric name","sub":"e.g. Ex-Isabelle Marrant · Italy","composition":"e.g. 100% Viscose","width":"e.g. 148cm","remnant":"e.g. 2.5 metres","price":"e.g. £40","slug":"the-slug"}`;

const hist=[];
let busy=false;

function addMsg(role,text){
  const msgs=document.getElementById('msgs');
  const row=document.createElement('div');
  row.className='msg-row'+(role==='user'?' user':'');
  if(role==='assistant'){const av=document.createElement('div');av.className='av';av.textContent='F';row.appendChild(av);}
  const b=document.createElement('div');
  b.className='bubble '+(role==='user'?'user':'bot');
  b.innerHTML=cleanText(text).replace(/\n/g,'<br>');
  row.appendChild(b);msgs.appendChild(row);msgs.scrollTop=msgs.scrollHeight;
}

function addCard(d){
  const msgs=document.getElementById('msgs');
  const wrap=document.createElement('div');wrap.className='msg-row';
  const spacer=document.createElement('div');spacer.style.width='38px';spacer.style.flexShrink='0';wrap.appendChild(spacer);
  const card=document.createElement('div');card.className='fabric-card-inline';
  card.innerHTML=`<div class="fci-head"><div class="fci-eye">Your match</div><div class="fci-name">${d.name||'—'}</div><div class="fci-sub">${d.sub||'—'}</div></div><div class="fci-specs">${d.composition?'<div class="fci-spec">Composition <span>'+d.composition+'</span></div>':''}${d.width?'<div class="fci-spec">Width <span>'+d.width+'</span></div>':''}${d.remnant?'<div class="fci-spec">Remnant <span>'+d.remnant+'</span></div>':''}</div><div class="fci-foot"><div class="fci-price">${d.price||'—'}</div><a class="fci-link" href="${d.slug?'https://selvedgeandbolts.com/products/'+d.slug:'#'}" target="_blank">View fabric</a></div>`;
  wrap.appendChild(card);msgs.appendChild(wrap);msgs.scrollTop=msgs.scrollHeight;
}

function showTyping(){
  const msgs=document.getElementById('msgs');
  const row=document.createElement('div');row.className='msg-row';row.id='trow';
  const av=document.createElement('div');av.className='av';av.textContent='F';row.appendChild(av);
  const b=document.createElement('div');b.className='bubble bot typing';
  b.innerHTML='<div class="td"></div><div class="td"></div><div class="td"></div>';
  row.appendChild(b);msgs.appendChild(row);msgs.scrollTop=msgs.scrollHeight;
}

function removeTyping(){const t=document.getElementById('trow');if(t)t.remove();}
function parseCard(text){const m=text.match(/FABRIC_CARD:(\{[\s\S]*?\})/);if(!m)return null;try{return JSON.parse(m[1]);}catch(e){return null;}}
function cleanText(text){return text.replace(/FABRIC_CARD:[\s\S]*$/,'').trim();}

async function callAPI(messages){
  const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYS,messages})});
  const data=await r.json();
  return data.content?.[0]?.text||null;
}

async function send(){
  const inp=document.getElementById('inp');const btn=document.getElementById('btn');
  const text=inp.value.trim();if(!text||busy)return;
  inp.value='';busy=true;btn.disabled=true;
  addMsg('user',text);hist.push({role:'user',content:text});showTyping();
  try{
    const reply=await callAPI(hist);removeTyping();
    if(reply){addMsg('assistant',reply);hist.push({role:'assistant',content:reply});const card=parseCard(reply);if(card)addCard(card);}
    else{addMsg('assistant','Something went quiet — give it another go?');}
  }catch(e){removeTyping();addMsg('assistant','Something went quiet — give it another go?');}
  busy=false;btn.disabled=false;inp.focus();
}

document.getElementById('inp').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});

(async()=>{
  busy=true;document.getElementById('btn').disabled=true;showTyping();
  try{
    const reply=await callAPI([{role:'user',content:'begin'}]);removeTyping();
    const msg=reply||'Hey, what are you making?';
    addMsg('assistant',msg);hist.push({role:'assistant',content:msg});
  }catch(e){removeTyping();addMsg('assistant','Hey, what are you making?');hist.push({role:'assistant',content:'Hey, what are you making?'});}
  busy=false;document.getElementById('btn').disabled=false;document.getElementById('inp').focus();
})();
</script>
